<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Task Detail Modal - Minimalist To-Do</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;family=Manrope:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface-variant": "#444748",
                      "on-tertiary-fixed-variant": "#45464e",
                      "on-secondary-fixed": "#1a1b22",
                      "on-primary-fixed": "#1c1b1b",
                      "on-primary-container": "#858383",
                      "inverse-surface": "#2f3132",
                      "on-error-container": "#93000a",
                      "primary-fixed-dim": "#c8c6c5",
                      "on-secondary": "#ffffff",
                      "error-container": "#ffdad6",
                      "on-surface": "#1a1c1d",
                      "on-secondary-fixed-variant": "#46464e",
                      "background": "#f9f9fa",
                      "primary": "#000000",
                      "surface-container-high": "#e8e8e9",
                      "tertiary-fixed-dim": "#c6c6cf",
                      "inverse-on-surface": "#f0f1f2",
                      "tertiary-fixed": "#e2e1eb",
                      "on-background": "#1a1c1d",
                      "secondary-container": "#e3e1ec",
                      "on-primary-fixed-variant": "#474646",
                      "error": "#ba1a1a",
                      "surface-container-low": "#f3f3f4",
                      "on-secondary-container": "#63646c",
                      "primary-container": "#1c1b1b",
                      "outline-variant": "#c4c7c7",
                      "outline": "#747878",
                      "secondary-fixed-dim": "#c6c5cf",
                      "surface-variant": "#e2e2e3",
                      "on-error": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "secondary-fixed": "#e3e1ec",
                      "secondary": "#5d5e66",
                      "surface-container": "#eeeeef",
                      "surface-tint": "#5f5e5e",
                      "on-tertiary-fixed": "#1a1b22",
                      "surface-bright": "#f9f9fa",
                      "surface-dim": "#dadadb",
                      "tertiary": "#000000",
                      "inverse-primary": "#c8c6c5",
                      "surface-container-highest": "#e2e2e3",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-container": "#83838c",
                      "on-primary": "#ffffff",
                      "surface": "#f9f9fa",
                      "tertiary-container": "#1a1b22",
                      "primary-fixed": "#e5e2e1"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "gutter": "1.5rem",
                      "container-max": "800px",
                      "lg": "2.5rem",
                      "sm": "1rem",
                      "unit": "4px",
                      "xl": "4rem",
                      "md": "1.5rem",
                      "xs": "0.5rem"
              },
              "fontFamily": {
                      "body-lg": [
                              "Inter"
                      ],
                      "headline-lg-mobile": [
                              "Manrope"
                      ],
                      "headline-sm": [
                              "Manrope"
                      ],
                      "headline-md": [
                              "Manrope"
                      ],
                      "label-caps": [
                              "JetBrains Mono"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "headline-lg": [
                              "Manrope"
                      ]
              },
              "fontSize": {
                      "body-lg": [
                              "16px",
                              {
                                      "lineHeight": "1.6",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg-mobile": [
                              "26px",
                              {
                                      "lineHeight": "1.2",
                                      "fontWeight": "600"
                              }
                      ],
                      "headline-sm": [
                              "18px",
                              {
                                      "lineHeight": "1.4",
                                      "fontWeight": "500"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "1.3",
                                      "fontWeight": "600"
                              }
                      ],
                      "label-caps": [
                              "12px",
                              {
                                      "lineHeight": "1",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "500"
                              }
                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "1.5",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "1.2",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "600"
                              }
                      ]
              }
      },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        .material-symbols-outlined.fill {
             font-variation-settings: 'FILL' 1;
        }
        
        /* Ambient shadow for modal */
        .ambient-shadow {
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04);
        }
        
        /* Custom checkbox styles */
        .min-checkbox {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid theme('colors.outline');
            border-radius: theme('borderRadius.DEFAULT');
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .min-checkbox:checked {
            background-color: theme('colors.primary');
            border-color: theme('colors.primary');
        }
        .min-checkbox:checked::after {
            content: '\2713';
            color: white;
            font-size: 10px;
            font-weight: bold;
        }
        
        /* Input focus transitions */
        .min-input {
            transition: border-color 0.2s ease;
        }
        .min-input:focus {
            outline: none;
            border-color: theme('colors.primary');
        }
      </style>
</head>
<body class="bg-surface-dim font-body-md text-on-surface min-h-screen flex items-center justify-center p-md sm:p-lg relative overflow-hidden">
<!-- Backdrop (Simulated) -->
<div class="absolute inset-0 bg-on-surface/20 z-0 backdrop-blur-[1px]"></div>
<!-- Modal Container -->
<div class="bg-surface-container-lowest rounded-xl w-full max-w-[600px] max-h-[921px] flex flex-col z-10 ambient-shadow overflow-hidden relative">
<!-- Header -->
<header class="flex justify-between items-start p-md border-b border-surface-variant shrink-0">
<div class="flex items-center gap-sm w-full">
<input class="min-checkbox mt-1" type="checkbox"/>
<input class="w-full bg-transparent border-none font-headline-md text-headline-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0" placeholder="Task title" type="text" value="Finalize Q3 Marketing Strategy Presentation"/>
</div>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-unit">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Scrollable Content Area -->
<main class="flex-1 overflow-y-auto p-md flex flex-col gap-lg">
<!-- Meta Info Row (Date & Tags) -->
<div class="flex flex-wrap items-center gap-md text-on-surface-variant">
<!-- Date Picker Trigger -->
<button class="flex items-center gap-xs hover:text-on-surface transition-colors group">
<span class="material-symbols-outlined text-[18px] group-hover:text-primary transition-colors" data-icon="calendar_today">calendar_today</span>
<span class="font-body-md text-body-md">Oct 24, 2023</span>
</button>
<!-- Separator -->
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<!-- Tags Area -->
<div class="flex items-center gap-xs flex-wrap">
<span class="bg-surface-container-low px-xs py-unit rounded font-label-caps text-label-caps text-on-surface-variant">MARKETING</span>
<span class="bg-surface-container-low px-xs py-unit rounded font-label-caps text-label-caps text-on-surface-variant">Q3</span>
<button aria-label="Add tag" class="flex items-center justify-center w-6 h-6 rounded border border-dashed border-outline-variant text-outline hover:text-primary hover:border-outline transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Notes Section -->
<section class="flex flex-col gap-xs">
<div class="flex items-center gap-xs text-on-surface-variant mb-unit">
<span class="material-symbols-outlined text-[18px]" data-icon="subject">subject</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Notes</h3>
</div>
<textarea class="w-full min-h-[120px] bg-transparent border-b border-surface-variant min-input resize-y font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0 pb-xs" placeholder="Add additional context or details here...">Ensure that the budget slides are updated with the latest figures from finance. Also, include the new vendor quotes for the campaign execution.</textarea>
</section>
<!-- Sub-tasks Section -->
<section class="flex flex-col gap-sm">
<div class="flex items-center justify-between mb-unit">
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="checklist">checklist</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Sub-tasks</h3>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-sm">1/3</span>
</div>
<div class="flex flex-col">
<!-- Sub-task Item (Completed) -->
<div class="group flex items-center gap-sm py-xs border-b border-surface-container hover:bg-surface-container-lowest transition-colors opacity-50">
<input checked="" class="min-checkbox" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface line-through flex-1">Review Q2 performance metrics</span>
<button aria-label="Delete sub-task" class="opacity-0 group-hover:opacity-100 text-outline-variant hover:text-error transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
</button>
</div>
<!-- Sub-task Item (Active) -->
<div class="group flex items-center gap-sm py-xs border-b border-surface-container hover:bg-surface-container-lowest transition-colors">
<input class="min-checkbox" type="checkbox"/>
<input class="bg-transparent border-none font-body-md text-body-md text-on-surface focus:ring-0 p-0 flex-1 min-input" placeholder="Sub-task name" type="text" value="Draft executive summary"/>
<button aria-label="Delete sub-task" class="opacity-0 group-hover:opacity-100 text-outline-variant hover:text-error transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
</button>
</div>
<!-- Sub-task Item (Active) -->
<div class="group flex items-center gap-sm py-xs border-b border-surface-container hover:bg-surface-container-lowest transition-colors">
<input class="min-checkbox" type="checkbox"/>
<input class="bg-transparent border-none font-body-md text-body-md text-on-surface focus:ring-0 p-0 flex-1 min-input" placeholder="Sub-task name" type="text" value="Compile new vendor quotes"/>
<button aria-label="Delete sub-task" class="opacity-0 group-hover:opacity-100 text-outline-variant hover:text-error transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
</button>
</div>
<!-- Add Sub-task Input -->
<div class="flex items-center gap-sm py-xs mt-xs text-outline-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
<input class="bg-transparent border-none font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0 p-0 flex-1 min-input" placeholder="Add sub-task" type="text"/>
</div>
</div>
</section>
<!-- Attachments (Bonus section for premium feel) -->
<section class="flex flex-col gap-xs mt-sm pb-md border-b border-surface-variant">
<div class="flex items-center gap-xs text-on-surface-variant mb-unit">
<span class="material-symbols-outlined text-[18px]" data-icon="attach_file">attach_file</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Attachments</h3>
</div>
<div class="flex gap-sm">
<div class="flex items-center gap-xs px-sm py-xs bg-surface-container-low rounded border border-surface-container hover:border-outline-variant transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant group-hover:text-primary transition-colors" data-icon="description">description</span>
<span class="font-body-md text-body-md text-on-surface text-sm">budget_v2.pdf</span>
</div>
<button class="flex items-center justify-center px-sm py-xs rounded border border-dashed border-outline-variant text-outline hover:text-primary hover:border-outline transition-colors text-sm font-body-md">
                        Upload
                    </button>
</div>
</section>
</main>
<!-- Footer Actions -->
<footer class="p-md flex justify-end gap-sm shrink-0 bg-surface-container-lowest">
<button class="px-md py-xs rounded font-headline-sm text-headline-sm text-secondary border border-outline-variant hover:bg-surface-container-low transition-colors">
                Delete
            </button>
<button class="px-md py-xs rounded font-headline-sm text-headline-sm bg-primary text-on-primary hover:opacity-90 transition-opacity">
                Save Changes
            </button>
</footer>
</div>
</body></html>
