<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;family=Manrope:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1a1c1d",
                        "surface-variant": "#e2e2e3",
                        "on-tertiary-fixed": "#1a1b22",
                        "background": "#f9f9fa",
                        "tertiary": "#000000",
                        "on-tertiary-fixed-variant": "#45464e",
                        "surface-bright": "#f9f9fa",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-container": "#e3e1ec",
                        "primary": "#000000",
                        "surface-container-low": "#f3f3f4",
                        "on-tertiary-container": "#83838c",
                        "outline": "#747878",
                        "tertiary-fixed": "#e2e1eb",
                        "primary-fixed": "#e5e2e1",
                        "inverse-surface": "#2f3132",
                        "secondary-fixed": "#e3e1ec",
                        "surface-dim": "#dadadb",
                        "tertiary-fixed-dim": "#c6c6cf",
                        "surface": "#f9f9fa",
                        "primary-container": "#1c1b1b",
                        "on-primary-container": "#858383",
                        "tertiary-container": "#1a1b22",
                        "on-background": "#1a1c1d",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e8e8e9",
                        "on-primary-fixed-variant": "#474646",
                        "inverse-primary": "#c8c6c5",
                        "on-primary-fixed": "#1c1b1b",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e2e2e3",
                        "secondary-fixed-dim": "#c6c5cf",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eeeeef",
                        "on-secondary-fixed-variant": "#46464e",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary": "#5d5e66",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-surface-variant": "#444748",
                        "surface-tint": "#5f5e5e",
                        "on-secondary-fixed": "#1a1b22",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#63646c",
                        "outline-variant": "#c4c7c7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "1.5rem",
                        "container-max": "800px",
                        "xl": "4rem",
                        "sm": "1rem",
                        "lg": "2.5rem",
                        "xs": "0.5rem",
                        "gutter": "1.5rem",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-md": ["Inter"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-lg": ["Manrope"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["18px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "headline-lg-mobile": ["26px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .auth-card {
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04);
        }
        input:focus {
            outline: none;
            border-bottom-color: #1a1c1d !important;
        }
    </style>
</head>
<body class="bg-surface-container-low text-on-surface font-body-md text-body-md min-h-screen flex flex-col">
<!-- TopAppBar Suppressed for Task-Focused Screen as per mandate -->
<main class="flex-grow flex items-center justify-center px-sm py-lg">
<div class="w-full max-w-[420px]">
<div class="auth-card bg-surface-container-lowest p-lg md:p-xl rounded-xl border border-outline-variant">
<!-- Brand Anchor / Logo -->
<div class="flex flex-col items-center mb-lg">
<div class="mb-md">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="check_box">check_box</span>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Crear cuenta</h1>
<p class="text-on-surface-variant font-body-md">Únete a Monochrome Task System</p>
</div>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-md">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="full_name">Nombre completo</label>
<input class="bg-transparent border-t-0 border-l-0 border-r-0 border-b border-outline-variant px-0 py-xs text-body-lg font-body-lg placeholder:text-outline-variant transition-colors focus:ring-0" id="full_name" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">Correo electrónico</label>
<input class="bg-transparent border-t-0 border-l-0 border-r-0 border-b border-outline-variant px-0 py-xs text-body-lg font-body-lg placeholder:text-outline-variant transition-colors focus:ring-0" id="email" placeholder="email@example.com" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Contraseña</label>
<input class="bg-transparent border-t-0 border-l-0 border-r-0 border-b border-outline-variant px-0 py-xs text-body-lg font-body-lg placeholder:text-outline-variant transition-colors focus:ring-0" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-md">
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                            Registrarse
                        </button>
</div>
</form>
<div class="mt-lg pt-lg border-t border-outline-variant text-center">
<p class="text-on-surface-variant mb-sm">¿Ya tienes una cuenta?</p>
<a class="inline-block font-headline-sm text-headline-sm text-primary hover:underline decoration-1 underline-offset-4" href="#">
                        Iniciar sesión
                    </a>
</div>
</div>
<!-- Optional visual element to reinforce minimalism -->
<div class="mt-lg text-center opacity-40">
<span class="font-label-caps text-label-caps">TASKFOCUS V.1.0</span>
</div>
</div>
</main>
<!-- BottomNavBar Suppressed for Transactional/Focused Screen as per mandate -->
</body></html>
